<head>

	<title>jQuery超炫平滑过渡垂直滚动视觉差特效|STARS_jQuery之家-自由分享jQuery、html5、css3的插件库</title>
	<link rel="stylesheet" type="text/css" href="css/normalize.css" />
	<link rel="stylesheet" type="text/css" href="css/default.css">
	<link href='http://fonts.useso.com/css?family=Quicksand' rel='stylesheet' type='text/css'>
	<style>
		body {
			height: 2500px;
			background: #000;
			overflow-x:hidden;
		}
		.star1 {
			position: absolute;
			background: #fff;
			width: 4px;
			height: 4px;
			border-radius: 4px;
		}
		.star2 {
		   position: absolute;
		   display: block;
		   color: #fff;
		   width: 0px;
		   height: 0px;
		   border-right:  10px solid transparent;
		   border-bottom: 7px  solid #fff;
		   border-left:   10px solid transparent;
		   transform:         rotate(35deg);
		   -webkit-transform: rotate(35deg);
		}
		.star2:before {
		   border-bottom: 8px solid #fff;
		   border-left: 3px solid transparent;
		   border-right: 3px solid transparent;
		   position: absolute;
		   height: 0;
		   width: 0;
		   top: -4.5px;
		   left: -6.5px;
		   display: block;
		   content: '';
		   transform:         rotate(-35deg);
		   -webkit-transform: rotate(-35deg);

		}
		.star2:after {
		   position: absolute;
		   display: block;
		   color: #fff;
		   top: 1px;
		   left: -10px;
		   width: 0px;
		   height: 0px;
		   border-right: 10px solid transparent;
		   border-bottom: 7px solid #fff;
		   border-left: 10px solid transparent;
		   transform:         rotate(-70deg);
		   -webkit-transform: rotate(-70deg);
		   content: '';
		}
		.related{background: #000;}
	</style>
	<!--[if IE]>
		<script src="http://libs.useso.com/js/html5shiv/3.7/html5shiv.min.js"></script>
	<![endif]-->
</head>
<body>
	<div class="htmleaf-container">
		<header class="htmleaf-header">
			<h1>jQuery超炫平滑过渡垂直滚动视觉差特效 <span>Smooth parallax effect on vertical page scrolling</span></h1>

				<a class="htmleaf-icon icon-htmleaf-home-outline" href="http://www.htmleaf.com/" title="jQuery之家" target="_blank"><span> jQuery之家</span></a>

			</div>

			  <a href="index.html">parallax</a>
			  <a href="stars.html"  class="current">stars</a>
			</div>
		</header>
		<section id="canvas"></section>
		<div class="related">
		    <h3>如果你喜欢这个插件，那么你可能也喜欢:</h3>
		    <a href="http://www.htmleaf.com/jQuery/shijuecha/201504261741.html">
			  <img src="related/1.jpg" width="300" alt="jQuery超炫图片3D背景视觉差特效插件"/>
			  <h3>jQuery超炫图片3D背景视觉差特效插件</h3>
			</a>
			<a href="http://www.htmleaf.com/jQuery/shijuecha/201504241732.html">
			  <img src="related/2.jpg" width="300" alt="jQuery超酷滚动背景图片视觉差特效插件"/>
			  <h3>jQuery超酷滚动背景图片视觉差特效插件</h3>
			</a>

	</div>
	
	<script src="js/jquery-2.1.3.min.js"></script>
	<script src="js/jquery.parallax-scroll.js"></script>
	<script>
		$(function(){
			var windowWidth = $(window).width();
			for(var i=0; i<100; i++) {
				var top = Math.random()*2200 - 50;
				var left = Math.random()*(windowWidth+50) - 50;
				var x = Math.random()*2000-1000;
				var y = Math.random()*2000-1000;
				var z = Math.random()*1500-1000;
				var rotateZ = Math.random()*600-300;
				var fromScroll = Math.max(0, top - 200 - Math.random()*800);
				var distance = 200+Math.random()*100;
				$("body").append('<div class="star'+((Math.random()>.5)?'1':'2')+'" style="top:' + top + 'px; left:' + left + 'px;" data-parallax=\'{"x":' + x + ',"y":' + y + ',"z":' + z + ',"rotateZ":' + rotateZ + ',"from-scroll":' + fromScroll + ',"distance":' + distance + '}\'></div>');
			}
		});
	</script>
</body>
