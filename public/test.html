<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试</title>
</head>
<body>
<video id="video" width="600" controls>
    <source src="2_hevc.mp4" type="video/mp4">
</video>

<script>
    const video = document.getElementById('video');
    let isReversing = false; // 标记是否正在倒放
    let reverseInterval;

    // 监听视频播放完的事件
    video.addEventListener('ended', () => {
        if (!isReversing) {
            startReversePlayback();
        }
    });

    function startReversePlayback() {
        isReversing = true;
        video.pause(); // 暂停正常播放

        reverseInterval = setInterval(() => {
            if (video.currentTime > 0) {
                video.currentTime -= 0.01; // 每次减少 0.1 秒
            } else {
                stopReversePlayback(); // 停止倒放
            }
        }, 10); // 每 10 毫秒更新一次
    }

    function stopReversePlayback() {
        clearInterval(reverseInterval); // 停止定时器
        reverseInterval = null;
        isReversing = false;
        video.currentTime = 0; // 重置到开头
        video.play(); // 重新开始正常播放
    }
</script>
</body>
</html>
